name: iOS Build and Test

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'agent/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 35
    env:
      PROJECT: WorldPostOfficeHome.xcodeproj
      SCHEME: WorldPostOfficeHome
      DERIVED_DATA: DerivedData
      RESULT_BUNDLE: TestResults.xcresult
      BUNDLE_ID: com.eiraworks.WorldPostOfficeHome

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Materialize generated image assets
        run: |
          set -o pipefail
          bash Scripts/materialize-assets.sh 2>&1 | tee asset-materialization.log
          test -s WorldPostOfficeHome/Assets.xcassets/MascotPostman.imageset/MascotPostman.png
          test -s WorldPostOfficeHome/Assets.xcassets/ProfileCatAvatar.imageset/ProfileCatAvatar.png
          test -s WorldPostOfficeHome/Assets.xcassets/PlantPolaroid.imageset/PlantPolaroid.png
          test -s WorldPostOfficeHome/Assets.xcassets/TokyoPostcard.imageset/TokyoPostcard.png
          test -s WorldPostOfficeHome/Assets.xcassets/TravelerRabbitAvatar.imageset/TravelerRabbitAvatar.png
          test -s WorldPostOfficeHome/Assets.xcassets/HeartEnvelope.imageset/HeartEnvelope.png

      - name: Generate Xcode project
        run: |
          xcodegen generate
          xcodebuild -list -project "$PROJECT"
          test -f "$PROJECT/xcshareddata/xcschemes/$SCHEME.xcscheme"

      - name: Resolve simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          UDID=$(python3 <<'PY'
          import json, subprocess
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]))
          preferred = ["iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15"]
          phones = [d for devices in data.get("devices", {}).values() for d in devices if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
          for name in preferred:
              for device in phones:
                  if device.get("name") == name:
                      print(device["udid"])
                      raise SystemExit
          if not phones:
              raise SystemExit("No available iPhone simulator")
          print(phones[0]["udid"])
          PY
          )
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Debug -destination 'generic/platform=iOS Simulator' -derivedDataPath "$DERIVED_DATA" CODE_SIGNING_ALLOWED=NO clean build | tee build.log

      - name: Boot simulator
        env:
          UDID: ${{ steps.simulator.outputs.udid }}
        run: |
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light
          xcrun simctl status_bar "$UDID" override --time 9:41 --batteryState charged --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true

      - name: Test
        env:
          UDID: ${{ steps.simulator.outputs.udid }}
        run: |
          set -o pipefail
          rm -rf "$RESULT_BUNDLE"
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Debug -destination "platform=iOS Simulator,id=$UDID" -derivedDataPath "$DERIVED_DATA" -resultBundlePath "$RESULT_BUNDLE" CODE_SIGNING_ALLOWED=NO test | tee test.log

      - name: Capture home screenshot
        if: always()
        env:
          UDID: ${{ steps.simulator.outputs.udid }}
        run: |
          set -euo pipefail
          exec > >(tee screenshot.log) 2>&1
          mkdir -p Screenshots
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'WorldPostOfficeHome.app' -print -quit)
          test -n "$APP_PATH"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light
          xcrun simctl status_bar "$UDID" override --time 9:41 --batteryState charged --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true
          xcrun simctl terminate "$UDID" "$BUNDLE_ID" || true
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" "$BUNDLE_ID" -AppleLanguages '(ko)' -AppleLocale ko_KR
          sleep 3
          xcrun simctl io "$UDID" screenshot Screenshots/home.png
          test -s Screenshots/home.png

      - name: Export test summary
        if: always()
        run: |
          if [[ -d "$RESULT_BUNDLE" ]]; then
            xcrun xcresulttool get test-results summary --path "$RESULT_BUNDLE" --format json > test-summary.json || true
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-home-visual
          path: |
            asset-materialization.log
            build.log
            test.log
            screenshot.log
            test-summary.json
            Screenshots/home.png
          if-no-files-found: error
          retention-days: 14
