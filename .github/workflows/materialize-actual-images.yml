# trigger: actual-png-commit-v2
name: Materialize actual design images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/materialize-actual-images.yml'
      - 'AssetSources/GeneratedAssetsHQ.zip.b64'

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message, '[materialized-assets]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write actual PNG files
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import base64, io, json, zipfile
          from pathlib import Path

          root = Path('.')
          source = root / 'AssetSources/GeneratedAssetsHQ.zip.b64'
          text = ''.join(source.read_text(encoding='utf-8').split())
          raw = base64.b64decode(text, validate=True)
          expected = [
              'BunnyAvatar', 'EnergyStamp', 'HeartEnvelope', 'HeroScene',
              'PlantPolaroid', 'ProfileCatAvatar', 'QuickChecklist',
              'QuickGift', 'QuickShop', 'QuickStampAlbum', 'TokyoPostcard'
          ]
          output = root / 'DesignAssets/Generated/App'
          catalog = root / 'WorldPostOfficeHome/Assets.xcassets'
          output.mkdir(parents=True, exist_ok=True)
          catalog.mkdir(parents=True, exist_ok=True)
          (catalog / 'Contents.json').write_text(json.dumps({'info': {'author': 'xcode', 'version': 1}}, indent=2) + '\n')

          with zipfile.ZipFile(io.BytesIO(raw)) as zf:
              members = {Path(p).stem: p for p in zf.namelist() if p.lower().endswith('.png')}
              missing = [n for n in expected if n not in members]
              if missing:
                  raise SystemExit('Missing: ' + ', '.join(missing))
              for name in expected:
                  data = zf.read(members[name])
                  if not data.startswith(b'\x89PNG\r\n\x1a\n'):
                      raise SystemExit(f'Invalid PNG: {name}')
                  (output / f'{name}.png').write_bytes(data)
                  imageset = catalog / f'{name}.imageset'
                  imageset.mkdir(parents=True, exist_ok=True)
                  (imageset / f'{name}.png').write_bytes(data)
                  (imageset / 'Contents.json').write_text(json.dumps({
                      'images': [{'filename': f'{name}.png', 'idiom': 'universal', 'scale': '1x'}],
                      'info': {'author': 'xcode', 'version': 1}
                  }, indent=2) + '\n')

          (root / 'DesignAssets/manifest.json').write_text(json.dumps({
              'reference': 'DesignAssets/References/HomeReference.webp',
              'assets': [f'DesignAssets/Generated/App/{n}.png' for n in expected]
          }, ensure_ascii=False, indent=2) + '\n')
          PY

      - name: Remove encoded staging files
        run: |
          rm -f AssetSources/GeneratedAssetsHQ.zip.b64
          rm -f AssetSources/GeneratedAssetsHQ.zip.b64.part*
          rm -f AssetSources/*.png.b64 AssetSources/*.png.b64.part*
          rm -f AssetSources/DirectBinaryPlan.md AssetSources/README_BINARY_UPLOAD.txt
          rm -f WorldPostOfficeHome/Assets.xcassets/ProfileCatAvatar.imageset/ProfileCatAvatar.png.b64
          rm -f noop2.txt temp_marker.txt temp_test.txt temp_test2.txt temp_test3.txt temp_test4.txt temp_test5.txt

      - name: Commit PNG files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m '[materialized-assets] add actual generated PNG files'
          git push origin HEAD:main
